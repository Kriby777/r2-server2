<!DOCTYPE html>
<html lang="de">
<head>
<link rel="icon" href="assets/favicon.ico" type="image/x-icon">
<link rel="icon" href="assets/icon-192.png" type="image/png" sizes="192x192">
<link rel="icon" href="assets/icon-512.png" type="image/png" sizes="512x512">
<link rel="img" href="assets/stream-placeholder.png" type="image/png">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<!-- Für Android/Chrome -->
<meta name="mobile-web-app-capable" content="yes">

<!-- Für iPhone/Safari. Läuft noch, ist aber "legacy" -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XD Remote</title>

</head>

<body>

<div class="container">

<h1>XD Remote</h1>

<div class="grid">

<div>

<div class="card">

<h2>Steuerung</h2>

<div class="buttons">

<button onclick="sendR2('click')">Click</button>
<button onclick="sendR2('enter')">Enter</button>

<button onclick="sendR2('close')">Close</button>
<button onclick="sendR2('lock')">Lock</button>

<button onclick="sendR2('leave')">Leave</button>
<button onclick="sendR2('restart')">Restart</button>

<button class="red" onclick="sendR2('shutdown')">
Shutdown
</button>

</div>

<div class="switch">
<label>Permalock</label>
<input type="checkbox"
onchange="sendR2(this.checked?'permalock_start':'permalock_stop')">
</div>

<div class="switch">
<label>Live Stream</label>
<input type="checkbox" id="streamToggle">
</div>

</div>

<div class="card">

<h2>Text senden</h2>

<input id="text" placeholder="Text...">
<button class="wide-btn" onclick="sendR2('text:'+text.value)">Senden</button>

<h2 style="margin-top:25px;">Hotkey</h2>

<input id="hotkey" placeholder="win+e">
<button class="wide-btn" onclick="sendR2('sc:'+hotkey.value)">
Hotkey senden
</button>

<h2 style="margin-top:25px;">Taskkill</h2>

<input id="task" placeholder="edge.exe">
<button class="wide-btn" onclick="sendR2('taskkill:'+task.value)">
Taskkill
</button>

<input id="pwsh" placeholder="PowerShell-Befehl">
<button class="wide-btn" onclick="sendR2('ps:'+pwsh.value)">
PowerShell
</button>

<textarea
    id="pwshOutput"
    readonly
    style="
        width:100%;
        height:220px;
        margin-top:15px;
        background:#111;
        color:#0f0;
        font-family:Consolas;
        resize:none;
    ">
</textarea>

</div>

<div class="card">

<details>

<summary>🔊 Sounds</summary>

<div class="buttons">
<button onclick="playSound('error1')">Error1</button>
<button onclick="playSound('error2')">Error2</button>
<button onclick="playSound('shutdown')">Shutdown</button>
<button onclick="playSound('startup')">Startup</button>
</div>

</details>

<details>

<summary>⬇ Updates</summary>

<div class="buttons">
<button onclick="updateFile('exe')">Update EXE</button>
<button onclick="updateFile('sounds')">Update Sounds</button>
<button onclick="updateFile('updater')">Get Updater</button>
</div>

</details>

<div class="status" id="serverStatus">
    Prüfe Server...
</div>

</div>

</div>

<div class="card stream-card">

<h2>Live Screenstream</h2>

<div class="stream">
<img id="stream" src="assets/stream-placeholder.png" alt="Stream">
</div>

</div>

</div>

</div>

<script>

const SERVER="https://r2-server-htvs.onrender.com";
const TARGET="pc-b";

async function sendR2(command) {
    try {
        const response = await fetch(SERVER + "/api/messages/send", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                sender: "pc-a",
                recipient: TARGET,
                content: "r2:" + command
            })
        });

        console.log(response.status);
        console.log(await response.text());

    } catch (err) {
        console.error(err);
    }

status.innerHTML="✔ "+command;

}

function playSound(name){

sendR2("play_sound:"+name);

}

function updateFile(name){

sendR2("update_"+name);

}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

const streamToggle = document.getElementById("streamToggle");

streamToggle.addEventListener("change", async () => {

    if (streamToggle.checked) {

        sendR2("screenstream_start");

    } else {

        sendR2("screenstream_stop");

        await sleep(500); // 0,5 Sekunden warten

        stream.src = "assets/stream-placeholder.png";

    }

});

setInterval(async () => {

    if (!streamToggle.checked) return;

    try {

        const r = await fetch(
            SERVER + "/api/screenstream/latest?sender=" + TARGET
        );

        if (!r.ok) return;

        const j = await r.json();

        if (j.image) {
            stream.src = "data:image/jpeg;base64," + j.image;
        }

    } catch (e) {
        console.error(e);
    }

}, 100);

async function checkServer(){

    const status = document.getElementById("serverStatus");

    try{

        const controller = new AbortController();

        const timeout = setTimeout(()=>{
            controller.abort();
        },5000);


        await fetch(SERVER,{
            method:"GET",
            signal:controller.signal
        });


        clearTimeout(timeout);

        status.textContent = "🟢 Server ist wach";

        status.className="status";


    }catch(error){

        status.textContent = "🔴 Server schläft";

        status.className="status red";

    }

}


// alle 30 Sekunden prüfen
checkServer();

setInterval(checkServer,30000);

async function updatePwsh() {

    try {

        const r = await fetch(
            SERVER + "/api/powershell/output?sender=" + TARGET
        );

        const j = await r.json();

        document.getElementById("pwshOutput").value = j.output;

    } catch {}

}

setInterval(updatePwsh, 500);

const img = document.getElementById("stream");

img.addEventListener("click", (e) => {

    const rect = img.getBoundingClientRect();

    const relX = (e.clientX - rect.left) / rect.width;
    const relY = (e.clientY - rect.top) / rect.height;

    console.log(relX, relY);

    sendR2(`mouse:${relX}:${relY}`);
});

</script>

</body>
</html>
